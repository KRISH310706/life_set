version: '3.9'

services:
  backend:
    build: ./backend
    container_name: lifeset-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - lifeset_db:/app/lifeset.db
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: lifeset-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  lifeset_db:
