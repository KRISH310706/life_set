# Render Blueprint - One-click deploy for LifeSet
# https://render.com/docs/blueprint-spec

services:
  # Backend API (FastAPI)
  - type: web
    name: lifeset-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GROQ_API_KEY
        sync: false  # You'll set this manually in Render dashboard
      - key: DATABASE_URL
        value: sqlite:///./lifeset.db
    healthCheckPath: /
    plan: free

  # Frontend (React/Vite)
  - type: web
    name: lifeset-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: lifeset-api
          type: web
          property: host
    plan: free
